<!DOCTYPE html>
<html>
<head>
    <title>Weather</title>

    <!-- Futuristic Orbitron Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.3s ease;
        }

        /* TOP IS NOW TRANSPARENT SO BACKGROUND SHOWS */
        #top {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: transparent;
            padding: 20px;
            text-align: center;
        }

        #bottom {
            flex: 1;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #city {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        #temp {
            font-size: 26px;
            font-weight: 700;
            margin-top: 10px;
        }

        #wind, #cond {
            font-size: 18px;
            opacity: 0.85;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div id="top">
    <h2 id="city"></h2>
    <p id="temp"></p>
    <p id="wind"></p>
    <p id="cond"></p>
</div>

<div id="bottom">
    <img id="photo">
</div>

<script>
function loadWeather() {
    const data = JSON.parse(localStorage.getItem("weatherData"));

    if (!data) {
        document.getElementById("city").innerText = "No data set";
        return;
    }

    document.getElementById("city").innerText = data.city;
    document.getElementById("temp").innerText = "Temperature: " + data.temperature;
    document.getElementById("wind").innerText = "Wind: " + data.wind;
    document.getElementById("cond").innerText = "Condition: " + data.condition;

    // Background color from admin
    if (data.bg) {
        const colors = {
            yellow: "#ffe066",
            blue: "#4da3ff",
            darkblue: "#003366",
            red: "#ff4d4d",
            darkred: "#660000"
        };

        document.body.style.background = colors[data.bg];
    }

    // Photo
    if (data.photo) {
        const img = document.getElementById("photo");
        img.src = data.photo;
        img.style.display = "block";
    }
}

loadWeather();
</script>

<!-- ⭐ AUTO REFRESH EVERY 5 SECONDS ⭐ -->
<script>
    setInterval(() => {
        location.reload();
    }, 5000);
</script>

</body>
</html>
