<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
        }
        button {
            padding: 12px;
            width: 100%;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h2>Weather Admin</h2>

<input id="city" placeholder="City">
<input id="temp" placeholder="Temperature">
<input id="wind" placeholder="Wind">
<input id="cond" placeholder="Condition">
<input id="photo" placeholder="Photo URL">

<select id="bg">
    <option value="">Select Background</option>
    <option value="yellow">Yellow</option>
    <option value="blue">Blue</option>
    <option value="darkblue">Dark Blue</option>
    <option value="red">Red</option>
    <option value="darkred">Dark Red</option>
</select>

<button onclick="saveData()">Save</button>

<script>
const BIN_URL = "https://api.jsonbin.io/v3/b/6a25a396f5f4af5e29c71fef";

function saveData() {
    const data = {
        city: document.getElementById("city").value,
        temperature: document.getElementById("temp").value,
        wind: document.getElementById("wind").value,
        condition: document.getElementById("cond").value,
        bg: document.getElementById("bg").value,
        photo: document.getElementById("photo").value
    };

    fetch(BIN_URL, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(() => alert("Saved!"))
    .catch(() => alert("Error saving data"));
}
</script>

</body>
</html>
