<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <!-- Futuristic Orbitron Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            background: #222;
            color: white;
            text-align: center;
            padding-top: 80px;
            margin: 0;
        }

        #box {
            background: #333;
            padding: 20px;
            width: 320px;
            margin: auto;
            border-radius: 10px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 5px;
            border-radius: 5px;
            border: none;
            font-family: 'Orbitron', sans-serif;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: dodgerblue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div id="box">
    <h2>Admin Login</h2>
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<script>
const ADMIN_PASSWORD = "Connor"; // Your password

function login() {
    const pass = document.getElementById("password").value;

    if (pass === ADMIN_PASSWORD) {
        showEditor();
    } else {
        alert("Wrong password");
    }
}

function showEditor() {
    const saved = JSON.parse(localStorage.getItem("weatherData")) || {};

    document.body.innerHTML = `
        <div id="box">
            <h2>Update Weather</h2>

            <input id="city" placeholder="City" value="${saved.city || ""}">
            <input id="temp" placeholder="Temperature (e.g. 22°C)" value="${saved.temperature || ""}">
            <input id="wind" placeholder="Wind (e.g. 10 km/h)" value="${saved.wind || ""}">
            <input id="cond" placeholder="Condition (Sunny, Rainy)" value="${saved.condition || ""}">

            <h3>Background Color</h3>
            <select id="bg">
                <option value="yellow" ${saved.bg === "yellow" ? "selected" : ""}>Yellow</option>
                <option value="blue" ${saved.bg === "blue" ? "selected" : ""}>Blue</option>
                <option value="darkblue" ${saved.bg === "darkblue" ? "selected" : ""}>Dark Blue</option>
                <option value="red" ${saved.bg === "red" ? "selected" : ""}>Red</option>
                <option value="darkred" ${saved.bg === "darkred" ? "selected" : ""}>Dark Red</option>
            </select>

            <br><br>

            <input id="photo" type="file" accept="image/*">
            <img id="preview" style="display:${saved.photo ? "block" : "none"};" src="${saved.photo || ""}">

            <button onclick="save()">Save</button>
        </div>
    `;
}

function save() {
    const fileInput = document.getElementById("photo");
    const file = fileInput.files[0];

    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            saveData(e.target.result);
        };
        reader.readAsDataURL(file);
    } else {
        saveData(null);
    }
}

function saveData(photoBase64) {
    const old = JSON.parse(localStorage.getItem("weatherData")) || {};

    const data = {
        city: document.getElementById("city").value,
        temperature: document.getElementById("temp").value,
        wind: document.getElementById("wind").value,
        condition: document.getElementById("cond").value,
        bg: document.getElementById("bg").value,
        photo: photoBase64 || old.photo || null
    };

    localStorage.setItem("weatherData", JSON.stringify(data));
    alert("Weather updated!");
}
</script>

</body>
</html>
